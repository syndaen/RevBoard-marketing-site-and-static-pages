<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Confirmed — RevBoard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0A0A0B;
      color: #F9FAFB;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1C1C1E;
      border: 1px solid #1F2937;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 440px;
      width: 100%;
      text-align: center;
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      color: #F9FAFB;
      letter-spacing: -0.5px;
      margin-bottom: 32px;
    }

    .icon {
      width: 64px;
      height: 64px;
      background: #1a3d2a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .checkmark {
      font-size: 32px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #F9FAFB;
      margin-bottom: 12px;
    }

    p {
      font-size: 15px;
      color: #9CA3AF;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .cta {
      background: #3B82F6;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      padding: 16px 32px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      width: 100%;
    }

    .cta:hover {
      background: #2563EB;
    }

    .divider {
      border: none;
      border-top: 1px solid #1F2937;
      margin: 28px 0;
    }

    .store-links {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .store-badge {
      background: #111827;
      border: 1px solid #374151;
      border-radius: 10px;
      padding: 10px 18px;
      color: #F9FAFB;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      flex: 1;
    }

    .store-badge:hover {
      background: #1F2937;
    }

    .store-label {
      font-size: 10px;
      color: #9CA3AF;
      display: block;
      margin-bottom: 2px;
    }

    .footer {
      margin-top: 32px;
      font-size: 12px;
      color: #6B7280;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">RevBoard</div>

    <div class="icon">
      <span class="checkmark">✓</span>
    </div>

    <h1>Email Confirmed</h1>
    <p>
      Your email address has been verified successfully.<br />
      Open the RevBoard app on your phone to complete your profile and access your garage.
    </p>

    <a href="revboard://" class="cta">Open RevBoard App</a>

    <hr class="divider" />

    <p style="margin-bottom: 16px;">Don't have the app yet?</p>
    <div class="store-links">
      <a href="https://apps.apple.com/app/revboard/id6761406907" class="store-badge">
        <span class="store-label">Download on the</span>
        App Store
      </a>
      <a href="https://play.google.com/store/apps/details?id=com.revboard.app" class="store-badge">
        <span class="store-label">Get it on</span>
        Google Play
      </a>
    </div>

    <p class="footer">RevBoard · Track your build · &copy; 2026</p>
  </div>
</body>
</html>
